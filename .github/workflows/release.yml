name: alpha-testing build

# Builds Lamp Bench on Windows, macOS (Apple Silicon) and Ubuntu, signs the
# updater artifacts, and uploads everything to a DRAFT release tagged
# `alpha-testing`. If every platform finishes cleanly the `publish` job
# flips that draft to a public prerelease. If any platform fails the draft
# stays hidden — so the in-app updater never sees a half-broken `latest.json`
# and existing installs don't auto-update onto a partial build.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    # Wipe any existing `alpha-testing` release before the matrix runs so
    # tauri-action's "find by tag" doesn't latch onto a stale public
    # release (which would defeat the draft-only semantics below).
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Delete any existing alpha-testing release + tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner, repo, per_page: 100 }
            );
            for (const r of releases.filter((r) => r.tag_name === 'alpha-testing')) {
              await github.rest.repos.deleteRelease({
                owner, repo, release_id: r.id,
              });
              core.notice(
                `Deleted release ${r.id} (draft=${r.draft}, prerelease=${r.prerelease}).`
              );
            }
            try {
              await github.rest.git.deleteRef({
                owner, repo, ref: 'tags/alpha-testing',
              });
              core.notice('Deleted tag alpha-testing.');
            } catch (e) {
              core.notice('Tag alpha-testing did not exist or could not be deleted.');
            }

  lint:
    # Cheap, fast gates that catch the usual breakage before we burn 20+
    # minutes on a three-OS native build matrix. TypeScript typecheck +
    # Rust clippy with warnings denied. Runs in parallel with prepare.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev

      - uses: pnpm/action-setup@v3
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm exec tsc --noEmit

      - name: Rust clippy (warnings denied)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --no-deps -- -D warnings

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  build:
    needs: [prepare, lint]
    strategy:
      # We want everyone's artifacts before publishing, so a failing
      # platform shouldn't cancel its siblings — they still upload to the
      # draft, the publish job below just won't flip it live.
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: windows-x86_64
            args: ''
          - platform: ubuntu-22.04
            label: linux-x86_64
            args: ''
          # One universal macOS build (Intel + Apple Silicon in a single
          # .dmg/.app) cross-compiled on the fast, always-available
          # Apple-Silicon runner. We used to have a separate macos-13 Intel
          # job, but those Intel runners sit in a multi-hour queue and were
          # blocking the publish gate (which needs every matrix job green).
          - platform: macos-latest
            label: darwin-universal
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        # The runner OS only matters for the build environment — the
        # artifacts it emits target every desktop distro: .deb covers
        # Debian/Ubuntu/Mint/Pop!/Elementary, .rpm covers Fedora/RHEL/
        # openSUSE, and .AppImage runs on ANYTHING with glibc (Arch, void,
        # etc.). `rpm` is what teaches the Tauri bundler to emit the .rpm.
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev \
            rpm

      - uses: pnpm/action-setup@v3
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (both macOS arches for the universal build)
        uses: dtolnay/rust-toolchain@stable
        with:
          # universal-apple-darwin lipo's both arch slices, so the runner
          # needs both targets installed.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache bundled service binaries
        uses: actions/cache@v4
        with:
          path: resources/.cache
          key: ${{ runner.os }}-resources-${{ hashFiles('scripts/binaries.json') }}

      # `--bundled-only` pulls just the essentials marked `bundled: true`
      # in scripts/binaries.json. Currently only Windows has binaries
      # pinned — the script no-ops on macOS/Linux and the platform-specific
      # tauri.windows.conf.json only adds the resources mapping on Win,
      # so the macOS/Linux installers ship as a shell without bundled
      # services until those binaries are added to the manifest.
      - name: Fetch bundled service binaries
        run: pnpm scripts:fetch-binaries -- --bundled-only

      # Derive a strictly-increasing version from the run number so the
      # in-app updater actually fires. Installed builds sit at some
      # 0.1.<N>; each workflow run produces 0.1.<run_number> which is
      # always greater (run_number is monotonic per workflow). Patched into
      # all three manifests so the bundler, the updater's latest.json, and
      # the JS app_version agree. github.run_number is constant across the
      # whole run, so every matrix OS stamps the identical version.
      - name: Stamp build version
        shell: bash
        run: |
          VER="0.1.${{ github.run_number }}"
          echo "Stamping version $VER"
          node -e "const f='package.json',j=require('./'+f);j.version='$VER';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          node -e "const f='src-tauri/tauri.conf.json',j=require('./'+f);j.version='$VER';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          node -e "const fs=require('fs');const f='src-tauri/Cargo.toml';let s=fs.readFileSync(f,'utf8');s=s.replace(/^version = \".*\"/m,'version = \"$VER\"');fs.writeFileSync(f,s)"

      - name: Build Tauri app + upload to alpha-testing draft
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — must be set or tauri-action skips emitting
          # `latest.json` + `.sig` files and the in-app updater silently
          # 404s. The keypair was generated locally with
          # `pnpm tauri signer generate`; the .pub half is checked into
          # tauri.conf.json under plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Single rolling channel tag — every run replaces the artifacts on
          # this one release. The version stamped above (0.1.<run_number>) is
          # what makes the updater fire; we intentionally do NOT create a tag
          # per build (that would pile up build-N tags forever).
          tagName: alpha-testing
          releaseName: 'Lamp Bench — alpha testing'
          # IMPORTANT: this body is set ONLY on the first build of each
          # alpha-testing release (the prepare job wipes the old release +
          # tag, then the first build matrix entry creates the draft with
          # this body). Subsequent matrix entries reuse the same draft and
          # tauri-action skips the body update if a release already exists.
          # That means anything we type in here is the canonical body for
          # the whole release; manual edits on GitHub stick until the next
          # workflow run.
          releaseBody: |
            **Rolling alpha build** for Lamp Bench.

            Pick the installer that matches your machine:
            - **Windows x64** — `.exe` (NSIS) or `.msi`
            - **macOS (Intel + Apple Silicon)** — `.dmg` or `.app.tar.gz` (universal)
            - **Linux Debian/Ubuntu/Mint** — `.deb`
            - **Linux Fedora/RHEL/openSUSE** — `.rpm`
            - **Any other Linux (Arch, etc.)** — `.AppImage`

            Built from commit `${{ github.sha }}`.
          # Drafts let all platforms upload without the release going
          # public; the `publish` job below flips this to a published
          # prerelease only when every platform succeeded.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

  publish:
    needs: build
    # success() is true only when EVERY matrix job in `needs` succeeded.
    # If any platform failed the draft stays hidden until a human looks.
    if: success()
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Publish the draft release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner, repo, per_page: 100 }
            );
            const draft = releases.find(
              (r) => r.tag_name === 'alpha-testing' && r.draft === true
            );
            if (!draft) {
              core.setFailed("no alpha-testing draft release to publish");
              return;
            }
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: draft.id,
              draft: false,
              prerelease: true,
            });
            core.notice(`Published release ${draft.id} (${draft.html_url}).`);
