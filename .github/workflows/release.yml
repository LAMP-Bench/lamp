name: alpha-testing build

# Builds Lamp Bench on Windows, macOS (Apple Silicon) and Ubuntu, signs the
# updater artifacts, and uploads everything to a DRAFT release tagged
# `alpha-testing`. If every platform finishes cleanly the `publish` job
# flips that draft to a public prerelease. If any platform fails the draft
# stays hidden — so the in-app updater never sees a half-broken `latest.json`
# and existing installs don't auto-update onto a partial build.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # We want everyone's artifacts before publishing, so a failing
      # platform shouldn't cancel its siblings — they still upload to the
      # draft, the publish job below just won't flip it live.
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: windows-x86_64
            args: ''
          - platform: ubuntu-22.04
            label: linux-x86_64
            args: ''
          - platform: macos-latest
            label: darwin-aarch64
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        # The runner OS only matters for the build environment — the
        # artifacts it emits target every desktop distro: .deb covers
        # Debian/Ubuntu/Mint/Pop!/Elementary, .rpm covers Fedora/RHEL/
        # openSUSE, and .AppImage runs on ANYTHING with glibc (Arch, void,
        # etc.). `rpm` is what teaches the Tauri bundler to emit the .rpm.
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev \
            rpm

      - uses: pnpm/action-setup@v3
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (with macOS aarch64 target when needed)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache bundled service binaries
        uses: actions/cache@v4
        with:
          path: resources/.cache
          key: ${{ runner.os }}-resources-${{ hashFiles('scripts/binaries.json') }}

      # `--bundled-only` pulls just the essentials marked `bundled: true`
      # in scripts/binaries.json. Currently only Windows has binaries
      # pinned — the script no-ops on macOS/Linux and the platform-specific
      # tauri.windows.conf.json only adds the resources mapping on Win,
      # so the macOS/Linux installers ship as a shell without bundled
      # services until those binaries are added to the manifest.
      - name: Fetch bundled service binaries
        run: pnpm scripts:fetch-binaries -- --bundled-only

      - name: Build Tauri app + upload to alpha-testing draft
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — must be set or tauri-action skips emitting
          # `latest.json` + `.sig` files and the in-app updater silently
          # 404s. The keypair was generated locally with
          # `pnpm tauri signer generate`; the .pub half is checked into
          # tauri.conf.json under plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Fixed tag — every successful run replaces the artifacts on
          # this one release. No version bumps required until cutting a
          # real stable release.
          tagName: alpha-testing
          releaseName: 'Lamp Bench — alpha testing'
          releaseBody: |
            **Rolling alpha build** for Lamp Bench.

            Pick the installer that matches your machine:
            - **Windows x64** — `.exe` (NSIS) or `.msi`
            - **macOS Apple Silicon** — `.dmg` or `.app.tar.gz`
            - **Linux Debian/Ubuntu/Mint** — `.deb`
            - **Linux Fedora/RHEL/openSUSE** — `.rpm`
            - **Any other Linux (Arch, etc.)** — `.AppImage`

            Last built from commit `${{ github.sha }}`.
          # Drafts let all platforms upload without the release going
          # public; the `publish` job below flips this to a published
          # prerelease only when every platform succeeded.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

  publish:
    needs: build
    # success() is true only when EVERY matrix job in `needs` succeeded.
    # If any platform failed the draft stays hidden until a human looks.
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner, repo, per_page: 100 }
            );
            const draft = releases.find(
              (r) => r.tag_name === 'alpha-testing' && r.draft === true
            );
            if (!draft) {
              core.setFailed("no alpha-testing draft release to publish");
              return;
            }
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: draft.id,
              draft: false,
              prerelease: true,
            });
            core.notice(`Published release ${draft.id} (${draft.html_url}).`);
