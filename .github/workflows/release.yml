name: alpha-testing build

# Builds Lamp Bench for Windows + Linux and pushes the artifacts to a rolling
# `alpha-testing` pre-release on GitHub. There are no production "main"
# releases yet — this is the only channel until the app stabilises.

# Manual-only. Push to main does NOT trigger a build — click "Run workflow"
# from the Actions tab when you actually want to publish a new alpha.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: windows-x64
          - platform: ubuntu-22.04
            label: linux-amd64
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v3
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache bundled service binaries
        uses: actions/cache@v4
        with:
          path: resources/.cache
          key: ${{ runner.os }}-resources-${{ hashFiles('scripts/binaries.json') }}

      - name: Fetch bundled service binaries
        run: pnpm scripts:fetch-binaries

      - name: Build Tauri app + upload to alpha-testing release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Fixed tag — every successful build replaces the artifacts here.
          # No version bumps required until we cut a real release.
          tagName: alpha-testing
          releaseName: 'Lamp Bench — alpha testing'
          releaseBody: |
            **Rolling alpha build** updated on every push to `main`.

            Pick the installer that matches your machine:
            - **Windows x64** — `.exe` (NSIS) or `.msi`
            - **Linux amd64** — `.deb` or `.AppImage` (shell only for now —
              Linux bundled services land in Phase 9)

            Last built from commit `${{ github.sha }}`.
          releaseDraft: false
          prerelease: true

      - name: Upload artifacts (manual runs without a release)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: lamp-bench-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/nsis/*
            src-tauri/target/release/bundle/msi/*
            src-tauri/target/release/bundle/deb/*
            src-tauri/target/release/bundle/appimage/*
          if-no-files-found: ignore
